# Reference: https://github.com/i3/i3/blob/next/etc/config

config-version = 2

# In i3, all workspaces are phantom
persistent-workspaces = ["1","2","3","4","5"]

# i3 doesn't have "normalizations" feature that why we disable them here.
# But the feature is very helpful.
# Normalizations eliminate all sorts of weird tree configurations that don't make sense.
# Give normalizations a chance and enable them back.
enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[mode.main.binding]
    # See: https://nikitabobko.github.io/AeroSpace/goodies#open-a-new-window-with-applescript
    cmd-enter = '''exec-and-forget osascript -e '
    tell application "Terminal"
        do script
        activate
    end tell'
    '''

    # i3 wraps focus by default
    cmd-left =         'focus --boundaries-action wrap-around-the-workspace left'
    cmd-down =         'focus --boundaries-action wrap-around-the-workspace down'
    cmd-up =         'focus --boundaries-action wrap-around-the-workspace up'
    cmd-right = 'focus --boundaries-action wrap-around-the-workspace right'

    cmd-shift-h = 'focus --boundaries-action wrap-around-the-workspace left'
    cmd-shift-j = 'focus --boundaries-action wrap-around-the-workspace down'
    cmd-shift-k = 'focus --boundaries-action wrap-around-the-workspace up'
    cmd-shift-l = 'focus --boundaries-action wrap-around-the-workspace right'

    cmd-shift-left = 'move left'
    cmd-shift-down = 'move down'
    cmd-shift-up = 'move up'
    cmd-shift-right = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    cmd-ctrl-alt-h = 'split horizontal'
    cmd-ctrl-alt-v = 'split vertical'

    cmd-shift-f = 'fullscreen'

    cmd-shift-s = 'layout v_accordion' # 'layout stacking' in i3
    cmd-shift-w = 'layout h_accordion' # 'layout tabbed' in i3
    cmd-shift-e = 'layout tiles horizontal vertical' # 'layout toggle split' in i3

    cmd-shift-space = 'layout floating tiling' # 'floating toggle' in i3

    # Not supported, because this command is redundant in AeroSpace mental model.
    # See: https://nikitabobko.github.io/AeroSpace/guide#floating-windows
    #cmd-space = 'focus toggle_tiling_floating'

    # `focus parent`/`focus child` are not yet supported, and it's not clear whether they
    # should be supported at all https://github.com/nikitabobko/AeroSpace/issues/5
    # cmd-a = 'focus parent'

    ctrl-1 = 'workspace 1'
    ctrl-2 = 'workspace 2'
    ctrl-3 = 'workspace 3'
    ctrl-4 = 'workspace 4'
    ctrl-5 = 'workspace 5'
    ctrl-6 = 'workspace 6'
    ctrl-7 = 'workspace 7'
    ctrl-8 = 'workspace 8'
    ctrl-9 = 'workspace 9'
    ctrl-0 = 'workspace 10'

    ctrl-cmd-h = 'workspace prev'
    ctrl-cmd-j = 'workspace next'
    ctrl-cmd-l = 'workspace next'
    ctrl-cmd-k = 'workspace prev'

    ctrl-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
    ctrl-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
    ctrl-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
    ctrl-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
    ctrl-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
    ctrl-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
    ctrl-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
    ctrl-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
    ctrl-shift-9 = 'move-node-to-workspace --focus-follows-window 9'
    ctrl-shift-0 = 'move-node-to-workspace --focus-follows-window 10'


    ctrl-cmd-down = 'move-node-to-workspace --focus-follows-window next'
    ctrl-cmd-right = 'move-node-to-workspace --focus-follows-window next'
    ctrl-cmd-left = 'move-node-to-workspace --focus-follows-window prev'
    ctrl-cmd-up = 'move-node-to-workspace --focus-follows-window prev'

    cmd-shift-c = 'reload-config'

    cmd-shift-r = 'mode resize'

[gaps]
    inner.horizontal = 4
    inner.vertical =   4
    outer.left =       4
    outer.bottom =     4
    outer.top =        4
    outer.right =      4

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

[[on-window-detected]]
if.app-id = 'com.brave.Browser'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
    if.app-id = 'org.alacritty'
    run = 'move-node-to-workspace 1' 

[[on-window-detected]]
    if.app-id = 'com.apple.Music'
    run = 'move-node-to-workspace 5'
